name: Publish Package

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@Bocek-Inc"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace packages/neouter

      - name: Publish to GitHub Packages
        run: npm publish --workspace packages/neouter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
